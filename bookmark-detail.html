<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkVault - Bookmark Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="alert-container"></div>
    <nav id="main-navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4"></nav>

    <div class="container">
        <a href="bookmarks.html" class="btn btn-outline-secondary mb-3">&larr; Back to Bookmarks</a>

        <!-- Bookmark Info Card -->
        <div class="card mb-4">
            <div class="card-body">
                <h4 id="bm-detail-title"></h4>
                <p><strong>URL:</strong> <a id="bm-detail-url" href="#" target="_blank"></a></p>
                <p><strong>Category:</strong> <span id="bm-detail-category"></span></p>
                <p><strong>Created:</strong> <span id="bm-detail-created"></span></p>
                <span id="bm-detail-fav" class="d-none"></span>
                <span id="bm-detail-archived" class="d-none"></span>
            </div>
        </div>

        <!-- Notes Section -->
        <h5 class="mb-3">Notes</h5>
        <div id="notes-list"></div>

        <!-- Add Note Form -->
        <div class="card mt-3">
            <div class="card-body">
                <form id="note-form">
                    <div class="mb-2">
                        <label for="note-content" class="form-label">Add a note</label>
                        <textarea class="form-control" id="note-content" rows="3" maxlength="1000" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Note</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>initBookmarkDetailPage();</script>
</body>
</html>
