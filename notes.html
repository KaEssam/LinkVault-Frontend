<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkVault - Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="alert-container"></div>
    <nav id="main-navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4"></nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4>Notes</h4>
            <button class="btn btn-primary" onclick="openNewNoteModal()">+ New Note</button>
        </div>

        <!-- Filter Bar -->
        <div class="row g-2 mb-3 align-items-end">
            <div class="col-md-3">
                <label for="note-filter-category" class="form-label">Category</label>
                <select class="form-select" id="note-filter-category">
                    <option value="">All Categories</option>
                </select>
            </div>
            <div class="col-md-3">
                <label for="note-filter-search" class="form-label">Search</label>
                <input type="text" class="form-control" id="note-filter-search" placeholder="Search...">
            </div>
            <div class="col-md-3">
                <div class="form-check mt-4">
                    <input class="form-check-input" type="checkbox" id="note-filter-pinned">
                    <label class="form-check-label" for="note-filter-pinned">Pinned only</label>
                </div>
            </div>
            <div class="col-md-3">
                <button class="btn btn-outline-primary me-1" id="note-filter-apply">Apply</button>
                <button class="btn btn-outline-secondary" id="note-filter-clear">Clear</button>
            </div>
        </div>

        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>Title</th>
                        <th>Content</th>
                        <th>Category</th>
                        <th>Pinned</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="notes-tbody"></tbody>
            </table>
        </div>
    </div>

    <!-- Note Modal -->
    <div class="modal fade" id="noteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="noteModalLabel">New Note</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="note-form">
                    <div class="modal-body">
                        <input type="hidden" id="note-id">
                        <div class="mb-3">
                            <label for="note-title" class="form-label">Title</label>
                            <input type="text" class="form-control" id="note-title" maxlength="100" required>
                        </div>
                        <div class="mb-3">
                            <label for="note-content-field" class="form-label">Content</label>
                            <textarea class="form-control" id="note-content-field" rows="5" maxlength="1000" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label for="note-category" class="form-label">Category</label>
                            <select class="form-select" id="note-category" required>
                                <option value="">Select category</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>initNotesPage();</script>
</body>
</html>
