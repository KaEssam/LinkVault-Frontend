<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkVault - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="alert-container"></div>

    <div class="auth-wrapper">
        <!-- Login Card -->
        <div class="card auth-card shadow">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">LinkVault</h3>
                <h5 class="text-center mb-3">Login</h5>
                <form id="login-form">
                    <div class="mb-3">
                        <label for="login-email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="login-email" required>
                    </div>
                    <div class="mb-3">
                        <label for="login-password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="login-password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <p class="text-center mt-3 mb-0">
                    Don't have an account? <a href="#" id="show-register">Register</a>
                </p>
            </div>
        </div>

        <!-- Register Card -->
        <div class="card auth-card shadow d-none">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">LinkVault</h3>
                <h5 class="text-center mb-3">Register</h5>
                <form id="register-form">
                    <div class="mb-3">
                        <label for="reg-firstname" class="form-label">First Name</label>
                        <input type="text" class="form-control" id="reg-firstname" maxlength="20" required>
                    </div>
                    <div class="mb-3">
                        <label for="reg-lastname" class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="reg-lastname" maxlength="20" required>
                    </div>
                    <div class="mb-3">
                        <label for="reg-email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="reg-email" maxlength="50" required>
                    </div>
                    <div class="mb-3">
                        <label for="reg-password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="reg-password" minlength="6" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Register</button>
                </form>
                <p class="text-center mt-3 mb-0">
                    Already have an account? <a href="#" id="show-login">Login</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>initLoginPage();</script>
</body>
</html>
