<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkVault - Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="alert-container"></div>
    <nav id="main-navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4"></nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4>Categories</h4>
            <button class="btn btn-primary" onclick="openNewCategoryModal()">+ New Category</button>
        </div>

        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Bookmarks</th>
                        <th>Notes</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="categories-tbody"></tbody>
            </table>
        </div>
    </div>

    <!-- Category Modal -->
    <div class="modal fade" id="categoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="categoryModalLabel">New Category</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form id="category-form">
                    <div class="modal-body">
                        <input type="hidden" id="category-id">
                        <div class="mb-3">
                            <label for="cat-name" class="form-label">Name</label>
                            <input type="text" class="form-control" id="cat-name" maxlength="100" required>
                        </div>
                        <div class="mb-3">
                            <label for="cat-desc" class="form-label">Description</label>
                            <textarea class="form-control" id="cat-desc" rows="3"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>initCategoriesPage();</script>
</body>
</html>
